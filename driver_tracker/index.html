<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#004C22" />
  <title>Driver Tracker | Chennai City Rides</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #004C22;
      --primary-soft: #166534;
      --accent: #22C55E;
      --bg: #F0F4F1;
      --surface: #FFFFFF;
      --text: #111827;
      --muted: #6B7280;
      --shadow: 0 12px 40px rgba(0, 76, 34, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body, html { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    .screen {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .screen.hidden { opacity: 0; pointer-events: none; z-index: -1; }

    .card {
      background: var(--surface); border-radius: 32px; padding: 48px 32px;
      width: 90%; max-width: 400px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.3);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .btn {
      width: 100%; padding: 20px; background: linear-gradient(135deg, var(--primary-soft), var(--primary));
      color: white; border: none; border-radius: 20px; font-weight: 700; font-size: 16px;
      cursor: pointer; transition: all 0.2s ease; box-shadow: 0 8px 24px rgba(0, 76, 34, 0.3);
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .btn:active { transform: scale(0.96); box-shadow: 0 4px 12px rgba(0, 76, 34, 0.2); }

    #permScreen { background: linear-gradient(160deg, var(--primary) 0%, var(--primary-soft) 100%); }
    
    .ring-container {
      width: 100px; height: 100px; border-radius: 50%; background: #F0FAF3;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 32px;
      position: relative;
    }
    .ring-pulse {
      position: absolute; width: 100%; height: 100%; border-radius: 50%;
      background: var(--accent); opacity: 0.15; animation: ping 2.5s infinite;
    }
    @keyframes ping { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(2); opacity: 0; } }

    h1 { font-family: 'Manrope', sans-serif; font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
    .sub { font-size: 15px; color: var(--muted); margin-bottom: 36px; line-height: 1.6; }

    #map { flex: 1; width: 100%; height: 100%; }
    
    .hud {
      position: absolute; top: 50px; left: 16px; right: 16px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
      padding: 16px 20px; border-radius: 24px; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: space-between;
    }
    .status-pill {
      display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700;
      background: #F1F5F9; padding: 8px 14px; border-radius: 99px;
    }
    .status-pill.active { background: #DCFCE7; color: var(--primary); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #94A3B8; }
    .status-pill.active .dot { background: var(--accent); animation: glow 2s infinite; }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } }

    .tracking-sheet {
      position: absolute; bottom: 24px; left: 16px; right: 16px; z-index: 1000;
      background: rgba(255, 255, 255, 0.98); padding: 24px; border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .stat-box { background: #F8FAFC; padding: 12px; border-radius: 16px; }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    .stat-value { font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 800; display: block; }
    
    .sync-meta {
      border-top: 1px solid #F1F5F9; padding-top: 12px; display: flex;
      justify-content: space-between; font-size: 11px; font-weight: 600; color: var(--muted);
    }

    /* Driver Marker */
    .driver-marker {
      width: 50px; height: 50px; background: rgba(34, 197, 94, 0.2);
      border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .marker-inner { width: 34px; height: 34px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .marker-inner svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>

  <!-- Permission Screen -->
  <div id="permScreen" class="screen">
    <div class="card">
      <div class="ring-container">
        <div class="ring-pulse"></div>
        <span style="font-size: 40px; z-index: 2;">🚛</span>
      </div>
      <h1>Start Tracking</h1>
      <p class="sub">Click below to begin broadcasting your location for this trip.</p>
      <button class="btn" onclick="startTracking()">
        Start Tracking Session
      </button>
    </div>
  </div>

  <!-- Map Screen -->
  <div id="mapScreen" class="screen hidden">
    <div class="hud">
      <div style="font-weight: 800; font-size: 14px;">Chennai City Rides</div>
      <div id="statusPill" class="status-pill active">
        <div class="dot"></div>
        <span>LIVE</span>
      </div>
    </div>
    <div id="map"></div>
    <div class="tracking-sheet">
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-label">Latitude</span>
          <span class="stat-value" id="latVal">--.------</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Longitude</span>
          <span class="stat-value" id="lngVal">--.------</span>
        </div>
      </div>
      <div class="sync-meta">
        <span id="syncStatus">Initializing...</span>
        <span id="syncTime">--:--:--</span>
      </div>
    </div>
  </div>

  <!-- Supabase & Leaflet JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // 1. CONFIGURATION
    const SUPABASE_URL = "https://dycanquxbnecrritcoou.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5Y2FucXV4Ym5lY3JyaXRjb291Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjc1MzEsImV4cCI6MjA5MDYwMzUzMX0.i85iLktslLTHZAF3V0xn8_5FKLwqUXqQP6eAai9rSyk";
    
    // Initialize Supabase correctly using window.supabase.createClient
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const tripId = params.get("trip_id");
    console.log("Trip ID:", tripId);

    let map = null, marker = null;

    function startTracking() {
      if (!tripId) {
        alert("Trip ID missing from URL");
        return;
      }

      if (!navigator.geolocation) {
        alert("Geolocation not supported by this browser");
        return;
      }

      // Show map screen immediately after clicking
      document.getElementById('permScreen').classList.add('hidden');
      document.getElementById('mapScreen').classList.remove('hidden');

      navigator.geolocation.watchPosition(
        async (position) => {
          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          console.log("Sending GPS:", latitude, longitude);
          
          // Update UI
          updateUI(latitude, longitude);

          // CORE INSERT LOGIC (Exact match for user's request)
          const { error } = await supabase
            .from("driver_locations")
            .upsert({
              trip_id: tripId,
              latitude: latitude,
              longitude: longitude,
              updated_at: new Date().toISOString(),
            });

          if (error) {
            console.error("Insert failed:", error.message);
            document.getElementById('syncStatus').innerText = "❌ Sync Error";
          } else {
            console.log("Inserted successfully ✅");
            document.getElementById('syncStatus').innerText = "✅ Live Synced";
            document.getElementById('syncTime').innerText = new Date().toLocaleTimeString();
          }
        },
        (error) => {
          console.error("GPS Error:", error.message);
          alert("Location permission denied or GPS signal lost");
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0,
        }
      );
    }

    function updateUI(lat, lng) {
      document.getElementById('latVal').innerText = lat.toFixed(6);
      document.getElementById('lngVal').innerText = lng.toFixed(6);

      if (!map) {
        map = L.map('map', { zoomControl: false }).setView([lat, lng], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const driverIcon = L.divIcon({
          className: '',
          html: `<div class="driver-marker"><div class="marker-inner"><svg viewBox="0 0 24 24"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9L18.4 10c-.4-1.1-1.4-2-2.4-2H12L9.6 6.5C9.2 6.2 8.6 6 8 6H4c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg></div></div>`,
          iconSize: [50, 50],
          iconAnchor: [25, 25]
        });
        marker = L.marker([lat, lng], { icon: driverIcon }).addTo(map);
      } else {
        marker.setLatLng([lat, lng]);
        map.panTo([lat, lng]);
      }
    }
  </script>
</body>
</html>
